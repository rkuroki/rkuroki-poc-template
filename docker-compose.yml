services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Maps local 'db' folder into container preserving SQLite state seamlessly
      - ./db:/app/db
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
